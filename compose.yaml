networks:
  shared_network:
    external: true
  internal_network:
    name: "${PROJECT_PREFIX}-internal_network"
    driver: bridge

volumes:
  db-data:

services:
  db:
    image: postgres:17-alpine
    container_name: "${PROJECT_PREFIX}-db"
    shm_size: 128mb
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal_network
